<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="60%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ecf8e"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#3ecf8e"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bgGrad)"/>
  <rect width="1280" height="400" fill="url(#dots)"/>

  <!-- Subtle left glow -->
  <ellipse cx="160" cy="200" rx="200" ry="180" fill="#3ecf8e" opacity="0.04"/>
  <!-- Subtle right glow -->
  <ellipse cx="1100" cy="200" rx="250" ry="200" fill="#4facfe" opacity="0.05"/>

  <!-- ── Neural network diagram (right side) ── -->
  <!-- Layer 1: input nodes -->
  <g opacity="0.7" filter="url(#glow)">
    <circle cx="820" cy="120" r="10" fill="url(#nodeGrad1)"/>
    <circle cx="820" cy="180" r="10" fill="url(#nodeGrad1)"/>
    <circle cx="820" cy="240" r="10" fill="url(#nodeGrad1)"/>
    <circle cx="820" cy="300" r="10" fill="url(#nodeGrad1)"/>
  </g>
  <!-- Layer 2: hidden nodes -->
  <g opacity="0.65" filter="url(#glow)">
    <circle cx="960" cy="140" r="10" fill="url(#nodeGrad2)"/>
    <circle cx="960" cy="200" r="10" fill="url(#nodeGrad2)"/>
    <circle cx="960" cy="260" r="10" fill="url(#nodeGrad2)"/>
    <circle cx="960" cy="320" r="10" fill="url(#nodeGrad2)"/>
  </g>
  <!-- Layer 3: output nodes -->
  <g opacity="0.9" filter="url(#softGlow)">
    <circle cx="1100" cy="170" r="12" fill="url(#accentGrad)"/>
    <circle cx="1100" cy="240" r="12" fill="url(#accentGrad)"/>
    <circle cx="1100" cy="310" r="12" fill="url(#accentGrad)"/>
  </g>

  <!-- Edges: layer 1 → layer 2 -->
  <g stroke="#4facfe" stroke-width="0.8" opacity="0.18">
    <line x1="830" y1="120" x2="950" y2="140"/><line x1="830" y1="120" x2="950" y2="200"/>
    <line x1="830" y1="120" x2="950" y2="260"/><line x1="830" y1="120" x2="950" y2="320"/>
    <line x1="830" y1="180" x2="950" y2="140"/><line x1="830" y1="180" x2="950" y2="200"/>
    <line x1="830" y1="180" x2="950" y2="260"/><line x1="830" y1="180" x2="950" y2="320"/>
    <line x1="830" y1="240" x2="950" y2="140"/><line x1="830" y1="240" x2="950" y2="200"/>
    <line x1="830" y1="240" x2="950" y2="260"/><line x1="830" y1="240" x2="950" y2="320"/>
    <line x1="830" y1="300" x2="950" y2="140"/><line x1="830" y1="300" x2="950" y2="200"/>
    <line x1="830" y1="300" x2="950" y2="260"/><line x1="830" y1="300" x2="950" y2="320"/>
  </g>
  <!-- Edges: layer 2 → layer 3 -->
  <g stroke="#3ecf8e" stroke-width="1" opacity="0.22">
    <line x1="970" y1="140" x2="1088" y2="170"/><line x1="970" y1="140" x2="1088" y2="240"/>
    <line x1="970" y1="140" x2="1088" y2="310"/>
    <line x1="970" y1="200" x2="1088" y2="170"/><line x1="970" y1="200" x2="1088" y2="240"/>
    <line x1="970" y1="200" x2="1088" y2="310"/>
    <line x1="970" y1="260" x2="1088" y2="170"/><line x1="970" y1="260" x2="1088" y2="240"/>
    <line x1="970" y1="260" x2="1088" y2="310"/>
    <line x1="970" y1="320" x2="1088" y2="170"/><line x1="970" y1="320" x2="1088" y2="240"/>
    <line x1="970" y1="320" x2="1088" y2="310"/>
  </g>

  <!-- Animated active edge highlight -->
  <line x1="830" y1="180" x2="1088" y2="240" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- ── Divider line ── -->
  <line x1="760" y1="60" x2="760" y2="340" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- ── Left content: text ── -->
  <!-- Badge pill -->
  <rect x="60" y="52" width="190" height="28" rx="14" fill="#3ecf8e" opacity="0.15"/>
  <rect x="60" y="52" width="190" height="28" rx="14" fill="none" stroke="#3ecf8e" stroke-width="1" opacity="0.4"/>
  <circle cx="80" cy="66" r="5" fill="#3ecf8e" opacity="0.9"/>
  <text x="94" y="71" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#3ecf8e" opacity="0.9" letter-spacing="1">LOCAL-FIRST · PRIVATE</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">NoCode</text>
  <text x="60" y="205" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" fill="url(#accentGrad)" letter-spacing="-1">Deep Learning</text>
  <text x="60" y="265" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Studio</text>

  <!-- Tagline -->
  <text x="60" y="307" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#94a3b8" letter-spacing="0.2">Train · Evaluate · Export — entirely on your machine.</text>

  <!-- Platform pills -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="88" height="26" rx="13" fill="#1e293b"/>
    <text x="44" y="17" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle"> macOS</text>

    <rect x="100" y="0" width="88" height="26" rx="13" fill="#1e293b"/>
    <text x="144" y="17" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle"> Windows</text>

    <rect x="200" y="0" width="110" height="26" rx="13" fill="#1e293b"/>
    <text x="255" y="17" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle">6 Modalities</text>

    <rect x="322" y="0" width="120" height="26" rx="13" fill="#1e293b"/>
    <text x="382" y="17" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle">40+ Architectures</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1280" height="4" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
