name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scan tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit

      - name: Dependency vulnerability audit
        id: pip_audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt | tee pip-audit.txt

      - name: Static security scan
        id: bandit
        continue-on-error: true
        run: |
          bandit -q -r \
            app.py \
            bootstrap_macos.py \
            bootstrap_windows.py \
            config.py \
            healthcheck.py \
            install.py \
            run_local.py \
            runtime_setup.py \
            data_pipeline \
            detection \
            eval \
            export \
            modalities \
            models \
            packaging \
            scripts \
            training \
            ui \
            -ll | tee bandit.txt

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Security scan summary"
            echo
            echo "- Dependency audit status: ${{ steps.pip_audit.outcome }}"
            echo "- Static scan status: ${{ steps.bandit.outcome }}"
            echo
            echo "### Dependency audit"
            echo '```text'
            if [ -f pip-audit.txt ]; then cat pip-audit.txt; else echo "No pip-audit output captured."; fi
            echo '```'
            echo
            echo "### Static scan"
            echo '```text'
            if [ -f bandit.txt ]; then cat bandit.txt; else echo "No bandit output captured."; fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            pip-audit.txt
            bandit.txt
          retention-days: 14
