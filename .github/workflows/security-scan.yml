name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scan tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt

      - name: Static security scan
        run: |
          bandit -q -r \
            app.py \
            bootstrap_macos.py \
            bootstrap_windows.py \
            config.py \
            healthcheck.py \
            install.py \
            run_local.py \
            runtime_setup.py \
            data_pipeline \
            detection \
            eval \
            export \
            modalities \
            models \
            packaging \
            scripts \
            training \
            ui \
            -ll
