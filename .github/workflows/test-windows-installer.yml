name: Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
          $candidatePaths = @(
            "C:\Program Files (x86)\Inno Setup 6",
            "C:\Program Files\Inno Setup 6"
          )
          foreach ($path in $candidatePaths) {
            if (Test-Path $path) {
              $path | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            }
          }
          $iscc = Get-Command iscc.exe -ErrorAction Stop
          Write-Host "Using ISCC at $($iscc.Source)"

      - name: Build Windows installer
        run: python packaging/build_windows_installer.py --version 1.0.0-ci

      - name: Show installer size
        run: |
          $installer = Get-ChildItem "dist/Output/NoCode-DL-Setup-*.exe" -ErrorAction Stop | Select-Object -First 1
          Write-Host "Installer: $($installer.FullName)"
          Write-Host ("Size: {0:N2} MB" -f ($installer.Length / 1MB))

      - name: Run installer silently
        run: |
          $installer = Get-ChildItem "dist/Output/NoCode-DL-Setup-*.exe" -ErrorAction Stop | Select-Object -First 1
          Start-Process -FilePath $installer.FullName -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait -NoNewWindow

      - name: Verify installed files
        run: |
          $installDir = Join-Path $env:LOCALAPPDATA "NoCode-DL"
          Write-Host "Checking install directory: $installDir"
          if (-not (Test-Path $installDir)) {
            throw "Install directory not found: $installDir"
          }

          $requiredFiles = @(
            "NoCode-DL.bat",
            "NoCode-DL.ps1",
            "bootstrap_windows.py",
            ".bundle_version",
            "install.py",
            "run_local.py",
            "runtime_setup.py",
            "requirements.txt"
          )

          foreach ($file in $requiredFiles) {
            $path = Join-Path $installDir $file
            if (-not (Test-Path $path)) {
              throw "Missing installed file: $path"
            }
            Write-Host "OK $file"
          }

          Get-Content (Join-Path $installDir ".bundle_version")

      - name: Smoke-test Python modules from install
        run: |
          $installDir = Join-Path $env:LOCALAPPDATA "NoCode-DL"
          python -c "import sys; from pathlib import Path; install_dir = Path(r'$installDir'); sys.path.insert(0, str(install_dir)); from runtime_setup import install_is_current; print('runtime_setup imported OK'); ok, reason = install_is_current(install_dir / '.venv'); print(f'install_is_current on fresh install: ok={ok}, reason={reason}'); assert not ok; version = (install_dir / '.bundle_version').read_text().strip(); print(f'Bundle version: {version}'); assert version"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoCode-DL-Setup-windows
          path: dist/Output/NoCode-DL-Setup-*.exe
          retention-days: 30
